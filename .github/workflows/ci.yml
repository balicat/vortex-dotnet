name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Pinned to a commit rather than the 0.76.0 tag: the FFI surface changed
      # right after the tag (vx_view parameters, error API) and the binding
      # targets the newer ABI. Re-pin to the next tagged release.
      - name: Checkout vortex (pinned)
        uses: actions/checkout@v4
        with:
          repository: spiraldb/vortex
          ref: b9779d641af0fd9a3646f2b4b15f2220431d5cca
          path: vortex

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: vortex

      - name: Build vortex-ffi
        working-directory: vortex
        run: cargo build --release -p vortex-ffi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Test
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            export VORTEX_FFI_PATH="$GITHUB_WORKSPACE/vortex/target/release/vortex_ffi.dll"
          else
            export VORTEX_FFI_PATH="$GITHUB_WORKSPACE/vortex/target/release/libvortex_ffi.so"
          fi
          dotnet test -c Release
